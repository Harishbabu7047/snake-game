<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    font-size: clamp(1.4rem, 4vw, 2rem);
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #00ff88;
    text-shadow: 0 0 12px #00ff88, 0 0 30px #00ff8866;
    margin-bottom: 14px;
  }

  /* ── Score Bar ── */
  #scorebar {
    display: flex;
    gap: 32px;
    margin-bottom: 14px;
  }
  .score-box {
    text-align: center;
  }
  .score-label {
    font-size: .7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
  }
  .score-val {
    font-size: 1.5rem;
    font-weight: 700;
    color: #00ff88;
    text-shadow: 0 0 8px #00ff8880;
  }

  /* ── Canvas Wrapper ── */
  #canvas-wrap {
    position: relative;
    border: 2px solid #00ff8840;
    border-radius: 8px;
    box-shadow: 0 0 30px #00ff8822, 0 0 60px #00ff8811;
    overflow: hidden;
    /* size set by JS */
  }

  canvas { display: block; background: #0d0d18; }

  /* ── Overlay (start / pause / game-over) ── */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,20,.82);
    backdrop-filter: blur(3px);
    gap: 12px;
    transition: opacity .25s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay-title {
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 700;
    color: #00ff88;
    text-shadow: 0 0 12px #00ff88;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    padding: 0 12px;
  }
  #overlay-msg {
    font-size: .85rem;
    color: #aaa;
    text-align: center;
    padding: 0 16px;
  }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 6px; }

  button {
    padding: 9px 22px;
    border: 1.5px solid #00ff88;
    border-radius: 6px;
    background: transparent;
    color: #00ff88;
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, box-shadow .2s, color .2s;
  }
  button:hover {
    background: #00ff8820;
    box-shadow: 0 0 14px #00ff8860;
  }
  button:active { background: #00ff8840; }
  button:disabled { opacity: .3; cursor: default; }

  /* ── Bottom controls ── */
  #controls {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── Mobile D-pad ── */
  #dpad {
    display: none;
    margin-top: 18px;
    grid-template-columns: repeat(3, 48px);
    grid-template-rows: repeat(2, 48px);
    gap: 6px;
  }
  @media (max-width: 600px) { #dpad { display: grid; } }

  .dpad-btn {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    padding: 0;
    border-radius: 8px;
  }
  /* grid positions: up=top-center, left=mid-left, right=mid-right, down=mid-center unused row handled by empty */
  #btn-up    { grid-column: 2; grid-row: 1; }
  #btn-left  { grid-column: 1; grid-row: 2; }
  #btn-down  { grid-column: 2; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>

<h1>🐍 Snake</h1>

<!-- Score display -->
<div id="scorebar">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-val" id="score">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Best</div>
    <div class="score-val" id="best">0</div>
  </div>
</div>

<!-- Game canvas -->
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>

  <!-- Overlay -->
  <div id="overlay">
    <div id="overlay-title">Snake</div>
    <div id="overlay-msg">Use arrow keys or the D-pad to move.</div>
    <div class="btn-row">
      <button id="btn-start">Start</button>
    </div>
  </div>
</div>

<!-- Persistent controls -->
<div id="controls">
  <button id="btn-pause" disabled>Pause</button>
  <button id="btn-restart" disabled>Restart</button>
</div>

<!-- Mobile D-pad -->
<div id="dpad">
  <button class="dpad-btn" id="btn-up">▲</button>
  <button class="dpad-btn" id="btn-left">◀</button>
  <button class="dpad-btn" id="btn-down">▼</button>
  <button class="dpad-btn" id="btn-right">▶</button>
</div>

<script>
/* =========================================================
   SNAKE GAME — vanilla JS, single file, no dependencies
   ========================================================= */

// ── Config ───────────────────────────────────────────────
const CELL   = 20;           // px per grid cell
const COLS   = 25;           // grid columns
const ROWS   = 25;           // grid rows
const BASE_SPEED = 130;      // ms per tick (lower = faster)
const SPEED_INC  = 3;        // ms faster per food eaten

// ── Colours ──────────────────────────────────────────────
const CLR = {
  bg:        '#0d0d18',
  grid:      '#ffffff08',
  snakeHead: '#00ff88',
  snakeBody: '#00cc66',
  snakeGlow: '#00ff8880',
  food:      '#ff4466',
  foodGlow:  '#ff446680',
  text:      '#ffffff',
};

// ── DOM refs ─────────────────────────────────────────────
const canvas     = document.getElementById('canvas');
const ctx        = canvas.getContext('2d');
const overlay    = document.getElementById('overlay');
const oTitle     = document.getElementById('overlay-title');
const oMsg       = document.getElementById('overlay-msg');
const btnStart   = document.getElementById('btn-start');
const btnPause   = document.getElementById('btn-pause');
const btnRestart = document.getElementById('btn-restart');
const scoreEl    = document.getElementById('score');
const bestEl     = document.getElementById('best');

// ── Size canvas ──────────────────────────────────────────
const W = COLS * CELL;
const H = ROWS * CELL;
canvas.width  = W;
canvas.height = H;
document.getElementById('canvas-wrap').style.cssText =
  `width:${W}px;height:${H}px;`;

// Clamp canvas to viewport width on small screens
(function fitCanvas() {
  const vw = window.innerWidth - 32;
  if (W > vw) {
    const s = vw / W;
    canvas.style.transform = `scale(${s})`;
    canvas.style.transformOrigin = 'top left';
    const wrap = document.getElementById('canvas-wrap');
    wrap.style.width  = (W * s) + 'px';
    wrap.style.height = (H * s) + 'px';
    wrap.style.overflow = 'visible';
  }
})();

// ── State ────────────────────────────────────────────────
let snake, dir, nextDir, food, score, best = 0;
let running = false, paused = false;
let tickTimer = null, speed = BASE_SPEED;
let animId = null;

// ── Init / Reset ─────────────────────────────────────────
function initGame() {
  // Start snake in the centre, 3 cells long, heading right
  const mid = { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) };
  snake   = [mid, {x: mid.x-1, y: mid.y}, {x: mid.x-2, y: mid.y}];
  dir     = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score   = 0;
  speed   = BASE_SPEED;
  scoreEl.textContent = 0;
  placeFood();
}

// ── Food placement ───────────────────────────────────────
function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

// ── Game tick ────────────────────────────────────────────
function tick() {
  if (!running || paused) return;

  dir = { ...nextDir };

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }
  // Self collision (skip tail tip — it will move away)
  if (snake.slice(0, -1).some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  // Eat food?
  if (head.x === food.x && head.y === food.y) {
    score++;
    if (score > best) { best = score; bestEl.textContent = best; }
    scoreEl.textContent = score;
    speed = Math.max(50, BASE_SPEED - score * SPEED_INC);
    placeFood();
    // Don't pop tail — snake grows
    restartTicker();
  } else {
    snake.pop(); // normal move: remove tail
  }
}

// ── Ticker management ────────────────────────────────────
function restartTicker() {
  clearInterval(tickTimer);
  tickTimer = setInterval(tick, speed);
}

// ── Render loop ──────────────────────────────────────────
function render() {
  animId = requestAnimationFrame(render);

  // Background
  ctx.fillStyle = CLR.bg;
  ctx.fillRect(0, 0, W, H);

  // Grid lines (subtle)
  ctx.strokeStyle = CLR.grid;
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c*CELL,0); ctx.lineTo(c*CELL,H); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0,r*CELL); ctx.lineTo(W,r*CELL); ctx.stroke();
  }

  // Food — glowing circle
  const fx = food.x * CELL + CELL/2, fy = food.y * CELL + CELL/2;
  ctx.save();
  ctx.shadowColor = CLR.foodGlow; ctx.shadowBlur = 18;
  ctx.fillStyle = CLR.food;
  ctx.beginPath();
  ctx.arc(fx, fy, CELL/2 - 2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Snake segments
  snake.forEach((seg, i) => {
    const x = seg.x * CELL, y = seg.y * CELL;
    const r = i === 0 ? 6 : 4; // head has rounder corners
    ctx.save();
    if (i === 0) {
      ctx.shadowColor = CLR.snakeGlow;
      ctx.shadowBlur  = 20;
      ctx.fillStyle   = CLR.snakeHead;
    } else {
      // gradient fade for body
      const t = i / snake.length;
      ctx.fillStyle = lerpColour('#00ff88', '#004422', t);
    }
    roundRect(ctx, x+1, y+1, CELL-2, CELL-2, r);
    ctx.fill();
    ctx.restore();
  });

  // Eyes on head
  drawEyes();
}

// ── Draw eyes ────────────────────────────────────────────
function drawEyes() {
  const h  = snake[0];
  const hx = h.x * CELL, hy = h.y * CELL;
  const d  = dir;
  const er = 2.5; // eye radius

  // Perpendicular offset for two eyes
  let e1, e2;
  if (d.x !== 0) {
    // Moving horizontally
    const ex = hx + (d.x > 0 ? CELL-6 : 5);
    e1 = { x: ex, y: hy + 5 };
    e2 = { x: ex, y: hy + CELL - 5 };
  } else {
    // Moving vertically
    const ey = hy + (d.y > 0 ? CELL-6 : 5);
    e1 = { x: hx + 5,        y: ey };
    e2 = { x: hx + CELL - 5, y: ey };
  }

  ctx.fillStyle = '#0d0d18';
  [e1, e2].forEach(e => {
    ctx.beginPath();
    ctx.arc(e.x, e.y, er, 0, Math.PI*2);
    ctx.fill();
  });
}

// ── Helpers ───────────────────────────────────────────────
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w, y,   x+w, y+r);
  c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h); c.quadraticCurveTo(x,   y+h, x, y+h-r);
  c.lineTo(x, y+r); c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

function lerpColour(hex1, hex2, t) {
  const parse = h => [
    parseInt(h.slice(1,3),16),
    parseInt(h.slice(3,5),16),
    parseInt(h.slice(5,7),16),
  ];
  const [r1,g1,b1] = parse(hex1);
  const [r2,g2,b2] = parse(hex2);
  const r = Math.round(r1 + (r2-r1)*t);
  const g = Math.round(g1 + (g2-g1)*t);
  const b = Math.round(b1 + (b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

// ── Game state transitions ────────────────────────────────
function startGame() {
  initGame();
  running = true;
  paused  = false;
  hideOverlay();
  btnPause.disabled   = false;
  btnRestart.disabled = false;
  btnPause.textContent = 'Pause';
  restartTicker();
  if (!animId) render();
}

function endGame() {
  running = false;
  clearInterval(tickTimer);
  oTitle.textContent = '💀 Game Over';
  oMsg.textContent   = `Score: ${score}  •  Best: ${best}`;
  showOverlay('Restart');
  btnPause.disabled = true;
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  btnPause.textContent = paused ? 'Resume' : 'Pause';
  if (paused) {
    oTitle.textContent = '⏸ Paused';
    oMsg.textContent   = 'Press Resume to continue.';
    showOverlay('Resume');
  } else {
    hideOverlay();
    restartTicker();
  }
}

function showOverlay(btnLabel) {
  btnStart.textContent = btnLabel;
  overlay.classList.remove('hidden');
}
function hideOverlay() { overlay.classList.add('hidden'); }

// ── Input handling ────────────────────────────────────────
const KEY_MAP = {
  ArrowUp:    { x:  0, y: -1 },
  ArrowDown:  { x:  0, y:  1 },
  ArrowLeft:  { x: -1, y:  0 },
  ArrowRight: { x:  1, y:  0 },
  w: { x:  0, y: -1 }, W: { x:  0, y: -1 },
  s: { x:  0, y:  1 }, S: { x:  0, y:  1 },
  a: { x: -1, y:  0 }, A: { x: -1, y:  0 },
  d: { x:  1, y:  0 }, D: { x:  1, y:  0 },
};

document.addEventListener('keydown', e => {
  // Spacebar = pause/resume
  if (e.code === 'Space') { e.preventDefault(); if (running) togglePause(); return; }

  const nd = KEY_MAP[e.key];
  if (!nd) return;
  e.preventDefault();

  // Prevent reversing direction
  if (nd.x === -dir.x && nd.y === -dir.y) return;
  nextDir = nd;

  // If paused and player presses a direction, resume
  if (paused) togglePause();
});

// D-pad buttons
function setDir(nd) {
  if (!running) return;
  if (nd.x === -dir.x && nd.y === -dir.y) return;
  nextDir = nd;
  if (paused) togglePause();
}
document.getElementById('btn-up').addEventListener('click',    () => setDir({x:0,y:-1}));
document.getElementById('btn-down').addEventListener('click',  () => setDir({x:0,y:1}));
document.getElementById('btn-left').addEventListener('click',  () => setDir({x:-1,y:0}));
document.getElementById('btn-right').addEventListener('click', () => setDir({x:1,y:0}));

// ── Button wiring ─────────────────────────────────────────
btnStart.addEventListener('click', () => {
  if (!running || paused) startGame(); // Start or restart after game-over
});
btnPause.addEventListener('click', togglePause);
btnRestart.addEventListener('click', startGame);

// ── Kick off the render loop immediately (shows idle board) ──
initGame();
render();
</script>
</body>
</html>
